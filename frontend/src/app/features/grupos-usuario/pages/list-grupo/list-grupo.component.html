<div class="list-page">
  <div class="page-inner">

    <div class="page-top">
      <div>
        <h1 class="page-title">Grupos de Usuário</h1>
        <p class="page-sub">Configure grupos e suas permissões de acesso ao sistema.</p>
      </div>
      <a routerLink="/grupos/novo" class="btn-new">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Novo Grupo
      </a>
    </div>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div> Carregando...
    </div>

    <div *ngIf="!isLoading" class="card">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Nome do Grupo</th>
            <th class="col-actions">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let g of grupos">
            <td class="td-muted">{{ g.id }}</td>
            <td class="td-nome">
              <div class="grupo-nome-wrap">
                <div class="grupo-avatar" [style.background]="'#1565C020'" [style.color]="'#1565C0'">
                  {{ g.nome.charAt(0).toUpperCase() }}
                </div>
                {{ g.nome }}
              </div>
            </td>
            <td class="col-actions">
              <a [routerLink]="['/grupos/editar', g.id]" class="action-btn">Editar / Permissões</a>
            </td>
          </tr>
          <tr *ngIf="grupos.length === 0">
            <td colspan="3" class="empty">Nenhum grupo cadastrado.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
