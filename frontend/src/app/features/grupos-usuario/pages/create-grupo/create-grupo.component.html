<div class="page-wrapper">

  <!-- HEADER compartilhado layout\shell -->

<main class="page-main">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <span class="bc-link">Grupos de Usuário</span>
      <span class="bc-sep">›</span>
      <span class="bc-cur">{{ tituloTela }}</span>
    </nav>

    <!-- Loading inicial -->
    <div *ngIf="isLoadingDados" class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Carregando dados...</span>
    </div>

    <!-- Conteúdo principal -->
    <ng-container *ngIf="!isLoadingDados">

      <!-- Feedback -->
      <div *ngIf="feedback" class="alert" [class.alert-ok]="feedback.tipo === 'success'" [class.alert-err]="feedback.tipo === 'error'">
        <span class="alert-icon">{{ feedback.tipo === 'success' ? '✓' : '✕' }}</span>
        <span>{{ feedback.texto }}</span>
        <button type="button" class="alert-close" (click)="fecharFeedback()">×</button>
      </div>

      <!-- Card: Dados do Grupo -->
      <div class="card">
        <div class="card-hd">
          <div class="hd-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Dados do Grupo</div>
            <div class="card-sub">Defina o nome que identificará este grupo no sistema.</div>
          </div>
        </div>
        <div class="card-body">
          <app-grupo-form
            [grupo]="grupoParaEditar"
            [isLoading]="isSubmitting"
          />
        </div>
      </div>

      <!-- Card: Permissões -->
      <div class="card card-perm">
        <div class="card-hd">
          <div class="hd-icon hd-icon-perm">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Permissões</div>
            <div class="card-sub">Configure o que este grupo pode acessar e realizar no sistema.</div>
          </div>
        </div>

        <app-permissao-list
          [rows]="permissaoRows"
          [niveis]="niveis"
          [isLoading]="isSubmitting"
          (rowsChange)="onRowsChange($event)"
        />
      </div>

      <!-- Ações -->
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancelar()" [disabled]="isSubmitting">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary" (click)="onSalvar()" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="spinner"></span>
          {{ isSubmitting ? 'Salvando...' : (modoEdicao ? 'Salvar Alterações' : 'Cadastrar Grupo') }}
        </button>
      </div>

    </ng-container>
  </main>
 <!-- ── footer compartilhado layout\shell ────────────────────────────────────────── -->
</div>
