<div class="dash-page">

  <!-- Header -->
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <h1 class="hero-title">Bem-vindo ao ConectaCae</h1>
        <p class="hero-sub">Selecione uma área abaixo para gerenciar o sistema.</p>
      </div>
      <div class="hero-meta">
        <span class="hero-date">{{ today | date:'EEEE, d \'de\' MMMM \'de\' y' : '' : 'pt-BR' }}</span>
        <span class="hero-badge">FURB — CAE</span>
      </div>
    </div>
  </div>

  <!-- Cards de acesso rápido -->
  <div class="cards-grid">
    <div class="dash-card" *ngFor="let card of cards">
      <div class="card-top">
        <div class="card-icon" [style.background]="card.cor + '18'" [style.color]="card.cor">
          <svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
            <path [attr.d]="card.icon"/>
          </svg>
        </div>
        <div class="card-stat">
          <span class="stat-num">{{ card.stat }}</span>
          <span class="stat-lbl">{{ card.statLabel }}</span>
        </div>
      </div>

      <div class="card-body">
        <h2 class="card-title">{{ card.titulo }}</h2>
        <p class="card-desc">{{ card.descricao }}</p>
      </div>

      <div class="card-footer">
        <a [routerLink]="card.route" class="card-btn" [style.--c]="card.cor">
          {{ card.routeLabel }}
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

</div>
