<div class="list-page">

  <div class="page-inner">

    <!-- TOPO -->
    <div class="page-top">
      <div>
        <h2 class="page-title">Agenda CAE</h2>
        <p class="page-sub">Gerencie horários de atendimento</p>
      </div>

      <button class="btn-new" (click)="novo()">
        + Novo horário
      </button>
    </div>

    <!-- TABELA -->
    <div class="card">

      <table class="data-table">

        <thead>
          <tr>
            <th>Data</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Status</th>
            <th>Observação</th>
            <th class="col-actions">Ações</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let h of service.horarios$ | async">

            <td class="td-bold">{{ h.data }}</td>
            <td>{{ h.horaInicio }}</td>
            <td>{{ h.horaFim }}</td>

            <td>
              <span class="chip" [ngClass]="h.disponivel ? 'chip-ok' : 'chip-off'">
                {{ h.disponivel ? 'Disponível' : 'Indisponível' }}
              </span>
            </td>

            <td class="td-muted">
              {{ h.observacao || '-' }}
            </td>

            <td class="col-actions">
              <a class="action-btn" (click)="editar(h.id)">Editar</a>
              <a class="action-btn" (click)="excluir(h.id)">Excluir</a>
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
