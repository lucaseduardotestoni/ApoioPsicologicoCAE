<!-- 
  Template do formulário reutilizável de usuário.
  Toda lógica está no .ts — este template apenas vincula dados e exibe erros.
-->
<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="usuario-form">

  <!-- ── NOME ──────────────────────────────────────── -->
  <div class="form-field">
    <label for="nome" class="form-label">
      Nome de Usuário <span class="required">*</span>
    </label>
    <input
      id="nome"
      type="text"
      formControlName="nome"
      class="form-input"
      [class.is-invalid]="hasError('nome')"
      placeholder="Ex.: joao.silva"
      autocomplete="username"
    />
    <div class="form-error" *ngIf="hasError('nome', 'required')">
      Nome é obrigatório.
    </div>
    <div class="form-error" *ngIf="hasError('nome', 'minlength')">
      Nome deve ter no mínimo 3 caracteres.
    </div>
    <div class="form-error" *ngIf="hasError('nome', 'maxlength')">
      Nome deve ter no máximo 20 caracteres.
    </div>
  </div>

  <!-- ── SENHA ─────────────────────────────────────── -->
  <div class="form-field">
    <label for="senha" class="form-label">
      Senha <span class="required" *ngIf="!isEditMode">*</span>
    </label>
    <div class="input-with-toggle">
      <input
        id="senha"
        [type]="showSenha ? 'text' : 'password'"
        formControlName="senha"
        class="form-input"
        [class.is-invalid]="hasError('senha')"
        [placeholder]="isEditMode ? 'Deixe em branco para manter a senha atual' : 'Mínimo 6 caracteres'"
        autocomplete="new-password"
      />
      <button
        type="button"
        class="toggle-btn"
        (click)="showSenha = !showSenha"
        [attr.aria-label]="showSenha ? 'Ocultar senha' : 'Mostrar senha'"
        [attr.title]="showSenha ? 'Ocultar senha' : 'Mostrar senha'"
      >
        <svg *ngIf="!showSenha" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
          <path
            d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12zm10 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"
            fill="currentColor"
          />
        </svg>
        <svg *ngIf="showSenha" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
          <path
            d="M3.3 2.3 21.7 20.7l-1.4 1.4-3.2-3.2A12.8 12.8 0 0 1 12 20c-6.5 0-10-6-10-6a20.4 20.4 0 0 1 5-5.5L1.9 3.7l1.4-1.4zm5.2 5.2A6 6 0 0 1 18 12c-.4.6-1.2 1.6-2.4 2.6l-1.8-1.8a3.5 3.5 0 0 0-4.6-4.6L8.5 7.5zm3 3 3 3a2.1 2.1 0 0 1-3-3zm.5-6.5c6.5 0 10 6 10 6a20.7 20.7 0 0 1-3.2 4L17.3 13A16 16 0 0 0 20 10.9c-1.4-1.7-4.4-4.9-8-4.9-1 0-1.9.2-2.8.5L7.6 4.9A10.5 10.5 0 0 1 12 4z"
            fill="currentColor"
          />
        </svg>
      </button>
    </div>
    <div class="form-error" *ngIf="!isEditMode && hasError('senha', 'required')">
      Senha é obrigatória.
    </div>
    <div class="form-error" *ngIf="hasError('senha', 'minlength')">
      Senha deve ter no mínimo 6 caracteres.
    </div>
  </div>

  <!-- ── CONFIRMAÇÃO DE SENHA ───────────────────────── -->
  <div class="form-field">
    <label for="confirmacaoSenha" class="form-label">
      Confirmar Senha <span class="required" *ngIf="!isEditMode">*</span>
    </label>
    <div class="input-with-toggle">
      <input
        id="confirmacaoSenha"
        [type]="showConfirmacao ? 'text' : 'password'"
        formControlName="confirmacaoSenha"
        class="form-input"
        [class.is-invalid]="hasError('confirmacaoSenha')"
        [placeholder]="isEditMode ? 'Preencha apenas se desejar alterar a senha' : 'Repita a senha'"
        autocomplete="new-password"
      />
      <button
        type="button"
        class="toggle-btn"
        (click)="showConfirmacao = !showConfirmacao"
        [attr.aria-label]="showConfirmacao ? 'Ocultar confirmação de senha' : 'Mostrar confirmação de senha'"
        [attr.title]="showConfirmacao ? 'Ocultar confirmação de senha' : 'Mostrar confirmação de senha'"
      >
        <svg *ngIf="!showConfirmacao" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
          <path
            d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12zm10 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"
            fill="currentColor"
          />
        </svg>
        <svg *ngIf="showConfirmacao" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
          <path
            d="M3.3 2.3 21.7 20.7l-1.4 1.4-3.2-3.2A12.8 12.8 0 0 1 12 20c-6.5 0-10-6-10-6a20.4 20.4 0 0 1 5-5.5L1.9 3.7l1.4-1.4zm5.2 5.2A6 6 0 0 1 18 12c-.4.6-1.2 1.6-2.4 2.6l-1.8-1.8a3.5 3.5 0 0 0-4.6-4.6L8.5 7.5zm3 3 3 3a2.1 2.1 0 0 1-3-3zm.5-6.5c6.5 0 10 6 10 6a20.7 20.7 0 0 1-3.2 4L17.3 13A16 16 0 0 0 20 10.9c-1.4-1.7-4.4-4.9-8-4.9-1 0-1.9.2-2.8.5L7.6 4.9A10.5 10.5 0 0 1 12 4z"
            fill="currentColor"
          />
        </svg>
      </button>
    </div>
    <div class="form-error" *ngIf="!isEditMode && hasError('confirmacaoSenha', 'required')">
      Confirmação de senha é obrigatória.
    </div>
    <div class="form-error" *ngIf="hasError('confirmacaoSenha', 'passwordMismatch')">
      As senhas não conferem.
    </div>
  </div>

  <!-- ── GRUPO DE USUÁRIO ───────────────────────────── -->
  <div class="form-field">
    <label for="grupoUsuarioId" class="form-label">
      Grupo de Usuário <span class="required">*</span>
    </label>
    <select
      id="grupoUsuarioId"
      formControlName="grupoUsuarioId"
      class="form-input form-select"
      [class.is-invalid]="hasError('grupoUsuarioId')"
    >
      <option [ngValue]="null" disabled>Selecione um grupo...</option>
      <option *ngFor="let grupo of grupos" [ngValue]="grupo.id">
        {{ grupo.nome }}
      </option>
    </select>
    <div class="form-error" *ngIf="hasError('grupoUsuarioId', 'required')">
      Grupo de usuário é obrigatório.
    </div>
  </div>

  <!-- ── STATUS ─────────────────────────────────────── -->
  <div class="form-field">
    <label class="form-label">Status</label>
    <div class="radio-group">
      <label class="radio-label">
        <input type="radio" formControlName="status" value="ATIVO" class="radio-input" />
        <span class="radio-custom ativo"></span>
        Ativo
      </label>
      <label class="radio-label">
        <input type="radio" formControlName="status" value="INATIVO" class="radio-input" />
        <span class="radio-custom inativo"></span>
        Inativo
      </label>
    </div>
  </div>

  <!-- ── TROCA DE SENHA ─────────────────────────────── -->
  <div class="form-field">
    <label class="checkbox-label">
      <input
        type="checkbox"
        formControlName="mudaSenha"
        class="checkbox-input"
      />
      <span class="checkbox-custom"></span>
      Obrigar troca de senha no primeiro login
    </label>
  </div>

  <!-- ── AÇÕES ──────────────────────────────────────── -->
  <div class="form-actions">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="onCancelar()"
      [disabled]="isLoading"
    >
      Cancelar
    </button>
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading"
    >
      <span *ngIf="isLoading" class="spinner"></span>
      <span>{{ isLoading ? 'Salvando...' : (isEditMode ? 'Salvar Alterações' : 'Cadastrar Usuário') }}</span>
    </button>
  </div>

</form>
