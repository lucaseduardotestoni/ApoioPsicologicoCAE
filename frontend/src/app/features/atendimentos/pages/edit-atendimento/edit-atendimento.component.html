<div class="form-page">
  <div class="page-inner">

    <div class="page-top">
      <div>
        <h1 class="page-title">Editar Atendimento</h1>
        <p class="page-sub">Atualize os dados do registro.</p>
      </div>
      <a routerLink="/atendimentos" class="btn-back">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Voltar
      </a>
    </div>

    <div *ngIf="feedbackMessage" class="alert app-toast-top-right" [class.alert-success]="feedbackMessage.tipo === 'success'" [class.alert-error]="feedbackMessage.tipo === 'error'">
      <span class="alert-icon">{{ feedbackMessage.tipo === 'success' ? '✓' : '✕' }}</span>
      <span class="alert-text">{{ feedbackMessage.texto }}</span>
      <button class="alert-close" (click)="fecharFeedback()">×</button>
    </div>

    <ng-container *ngIf="!isLoadingPage; else loadingTemplate">
      <app-atendimento-form
        [form]="form"
        [estudantes]="estudantes"
        [tipos]="tipos"
        [isLoading]="isSubmitting"
        [isLoadingEstudantes]="isLoadingEstudantes"
        submitLabel="Atualizar"
        (formSubmit)="onSubmit()"
        (cancelar)="onCancelar()"
      />
    </ng-container>

    <ng-template #loadingTemplate>
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Carregando atendimento...</span>
      </div>
    </ng-template>

  </div>
</div>
