<div class="form-page">
  <div class="page-inner">

    <!-- Header -->
    <div class="page-top">
      <div>
        <h1 class="page-title">Novo Comunicado</h1>
        <p class="page-sub">Preencha os dados para criar um novo comunicado.</p>
      </div>
      <a routerLink="/comunicados" class="btn-back">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Voltar
      </a>
    </div>

    <div *ngIf="feedbackMessage" class="alert app-toast-top-right" [class.alert-success]="feedbackMessage.tipo === 'success'" [class.alert-error]="feedbackMessage.tipo === 'error'">
      <span class="alert-icon">{{ feedbackMessage.tipo === 'success' ? '✓' : '✕' }}</span>
      <span class="alert-text">{{ feedbackMessage.texto }}</span>
      <button class="alert-close" (click)="fecharFeedback()">×</button>
    </div>

    <!-- Card do formulário -->
    <div class="card">
      <app-comunicado-form
        [grupos]="grupos"
        [loading]="loading"
        (formSubmit)="onFormSubmit($event)"
        (cancelar)="onCancelar()"
      ></app-comunicado-form>
    </div>

  </div>
</div>
