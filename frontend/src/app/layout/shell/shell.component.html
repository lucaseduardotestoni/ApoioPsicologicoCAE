<!-- ═══════════════════════════════════════════════════════════
     Shell — layout persistente de todas as páginas internas
     ═══════════════════════════════════════════════════════════ -->
<div class="shell">

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">

      <!-- Logo -->
      <a class="logo" routerLink="/dashboard" (click)="closeMobileMenu()">
        <div class="logo-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="7" fill="white" fill-opacity=".18"/>
            <path d="M18 7C11.93 7 7 11.93 7 18s4.93 11 11 11 11-4.93 11-11S24.07 7 18 7zm0 3.5a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm0 15.4c-3.5 0-6.62-1.79-8.4-4.49.04-2.79 5.6-4.33 8.4-4.33 2.79 0 8.36 1.54 8.4 4.33-1.78 2.7-4.9 4.49-8.4 4.49z" fill="white"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">ConectaCAE</span>
          <span class="logo-sub">FURB - Universidade Regional de Blumenau</span>
        </div>
      </a>

      <!-- Navbar desktop -->
      <nav class="navbar" aria-label="Navegação principal">
        <a
          *ngFor="let item of NAV_ITEMS"
          class="nav-item"
          [class.active]="isActive(item.route)"
          [routerLink]="item.route"
          (click)="closeMobileMenu()"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path [attr.d]="item.icon" fill="currentColor"/>
          </svg>
          <span>{{ item.label }}</span>
          <!-- Indicador de rota ativa -->
          <span class="active-dot" *ngIf="isActive(item.route)"></span>
        </a>
      </nav>

      <!-- Info do usuário (mock) -->
      <div class="user-area">
        <div class="user-avatar">GK</div>
        <div class="user-info">
          <span class="user-name">Guilherme K.</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>

      <!-- Botão hambúrguer (mobile) -->
      <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Abrir menu">
        <span [class.open]="mobileMenuOpen"></span>
        <span [class.open]="mobileMenuOpen"></span>
        <span [class.open]="mobileMenuOpen"></span>
      </button>

    </div>

    <!-- Barra dourada -->
    <div class="gold-bar"></div>

    <!-- Menu mobile dropdown -->
    <nav class="mobile-menu" [class.open]="mobileMenuOpen" aria-label="Menu mobile">
      <a
        *ngFor="let item of NAV_ITEMS"
        class="mobile-item"
        [class.active]="isActive(item.route)"
        [routerLink]="item.route"
        (click)="closeMobileMenu()"
      >
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path [attr.d]="item.icon" fill="currentColor"/>
        </svg>
        {{ item.label }}
      </a>
    </nav>
  </header>

  <!-- ── CONTEÚDO DAS ROTAS ─────────────────────────────────── -->
  <main class="content">
    <router-outlet />
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────── -->
  <footer class="footer">
    <span>Projeto de TCC</span>
    <span class="sep">·</span>
    <span>Alunos: Eduardo Zirbell e Guilherme Kuhnen</span>
    <span class="sep">·</span>
    <span>Curso: Sistemas de Informação</span>
    <span class="sep">·</span>
    <span>Orientadora: Simone Erbs da Costa</span>
  </footer>

</div>
